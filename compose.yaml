services:
  suse-assist:
    build:
      context: .
      dockerfile: Containerfile
    container_name: opensuse-leap-ai-guide
    volumes:
      - opensuse-ai-data:/app/data
    ports:
      - "7860:7860"
    # Resource constraints — tuned for Qwen3-4B (standard tier)
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "4"
        reservations:
          memory: 3G
          cpus: "2"
    # Interactive terminal for CLI
    stdin_open: true
    tty: true
    # Security: read-only root filesystem, drop all caps
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    # Health check for the Gradio web UI
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  opensuse-ai-data:
    driver: local
