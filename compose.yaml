services:
  suse-assist:
    build:
      context: .
      dockerfile: Containerfile
    container_name: opensuse-leap-ai-guide
    volumes:
      - model-data:/app/data
    # Resource constraints — matches project requirement for evaluation
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
        reservations:
          memory: 2G
          cpus: "2"
    # Interactive terminal for CLI
    stdin_open: true
    tty: true
    # Security: read-only root filesystem, drop all caps
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  model-data:
    driver: local
