# Default configuration for the openSUSE AI Onboarding Assistant
# Override any setting here; otherwise defaults from config.py apply.

model:
  # Inference mode: "local" (llama-cpp-python) or "api" (HF Inference API)
  # Use "local" for CLI / container deployments, "api" for HF Spaces
  inference_mode: "local"
  # Hardware tier: "test", "lite", "standard", "full", "auto", or "custom".
  # Keep "test" in version control to avoid surprise multi-GB downloads.
  # Production deployments should use "standard" (Qwen3-4B) or "auto".
  # Use: suse-assist models recommend
  tier: "test"
  # These fields are replaced by the tier unless tier is "custom".
  # Default values here match the "test" tier (TinyLlama 1.1B for CI/demo).
  repo_id: "TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF"
  filename: "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
  # HF Inference API model (used when inference_mode: "api")
  api_model_id: "Qwen/Qwen3-235B-A22B"
  # Context and generation parameters — tuned for Qwen3 family.
  # TinyLlama (test tier) will override n_ctx to 2048 via apply_model_tier().
  n_ctx: 32768
  n_threads: 4
  n_gpu_layers: -1   # -1 = all layers to GPU (Metal/CUDA). Set 0 for CPU-only.
  temperature: 0.4
  max_tokens: 700
  repeat_penalty: 1.1

embedding:
  model_name: "all-MiniLM-L6-v2"
  device: "cpu"

rag:
  chunk_size: 500
  chunk_overlap: 100
  top_k: 8
  collection_name: "opensuse_docs"
  persist_directory: "./data/vectorstore"
  backend: "lancedb"

data_dir: "./data"
log_level: "INFO"
